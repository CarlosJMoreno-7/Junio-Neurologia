<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Neurología HCG — Junio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a5c3a;
    --green-mid: #2d7a52;
    --green-light: #e8f5ee;
    --green-pale: #f4faf6;
    --accent: #c8e6d4;
    --text: #1a1f1c;
    --text-muted: #5a6b62;
    --text-hint: #94a89e;
    --border: #dde8e2;
    --border-strong: #b8cfc3;
    --surface: #ffffff;
    --bg: #f4faf6;
    --guardia-bg: #e8f0fb; --guardia-txt: #1a3a6b; --guardia-border: #b8ccf0;
    --clase-bg: #e8f5ee; --clase-txt: #1a4d2e; --clase-border: #a8d8bc;
    --caso-bg: #fbeaf0; --caso-txt: #6b1a3a; --caso-border: #f0b8cc;
    --consul-bg: #faf3e8; --consul-txt: #5a3a1a; --consul-border: #e0c898;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: var(--green);
    color: white;
    padding: 2rem 2rem 1.5rem;
    border-bottom: 3px solid var(--green-mid);
  }
  header .logo-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem;
  }
  header .logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: white;
  }
  header h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
  header p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .controls {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .controls-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .controls-row:last-child { margin-bottom: 0; }

  .section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-hint);
    min-width: 50px; flex-shrink: 0;
  }

  input[type=text] {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 6px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg); color: var(--text);
    outline: none; width: 200px;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--green-mid); }

  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 4px 10px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    cursor: pointer; background: var(--surface);
    color: var(--text-muted);
    transition: all 0.12s; user-select: none;
    font-family: 'DM Sans', sans-serif;
  }
  .pill:hover { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }
  .pill.active { background: var(--green); color: white; border-color: var(--green); }
  .pill.t-guardia.active { background: var(--guardia-txt); border-color: var(--guardia-txt); }
  .pill.t-clase.active { background: var(--clase-txt); border-color: var(--clase-txt); }
  .pill.t-caso.active { background: var(--caso-txt); border-color: var(--caso-txt); }
  .pill.t-consul.active { background: var(--consul-txt); border-color: var(--consul-txt); }

  .sep { color: var(--border-strong); font-size: 16px; margin: 0 2px; }

  .btn-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 0;
    text-decoration: underline; text-underline-offset: 2px;
    transition: color 0.12s;
  }
  .btn-text:hover { color: var(--green); }

  .ev-list { display: flex; flex-direction: column; gap: 5px; }

  .ev-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .ev-row:hover { background: var(--green-pale); border-color: var(--border-strong); }
  .ev-row.checked { background: var(--green-light); border-color: var(--green-mid); }

  .ev-row input[type=checkbox] {
    width: 15px; height: 15px; flex-shrink: 0;
    margin-top: 2px; cursor: pointer;
    accent-color: var(--green);
  }

  .ev-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-hint);
    min-width: 58px; flex-shrink: 0; padding-top: 2px;
  }

  .ev-body { flex: 1; min-width: 0; }
  .ev-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ev-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ev-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .badge {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 100px; flex-shrink: 0;
    font-family: 'DM Mono', monospace; letter-spacing: 0.02em;
  }
  .badge-guardia { background: var(--guardia-bg); color: var(--guardia-txt); border: 0.5px solid var(--guardia-border); }
  .badge-clase { background: var(--clase-bg); color: var(--clase-txt); border: 0.5px solid var(--clase-border); }
  .badge-caso { background: var(--caso-bg); color: var(--caso-txt); border: 0.5px solid var(--caso-border); }
  .badge-consultorio { background: var(--consul-bg); color: var(--consul-txt); border: 0.5px solid var(--consul-border); }

  .empty {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-hint); font-size: 13px;
  }

  .sticky-bar {
    position: sticky; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 -4px 12px rgba(26,92,58,0.06);
  }
  .sticky-inner { max-width: 820px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .count { font-size: 12px; color: var(--text-muted); flex: 1; min-width: 120px; font-family: 'DM Mono', monospace; }

  .btn-add {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 18px;
    background: var(--green); color: white;
    border: none; border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s;
  }
  .btn-add:hover { background: var(--green-mid); }
  .btn-add:disabled { background: var(--border-strong); cursor: not-allowed; }
  .btn-add svg { width: 15px; height: 15px; }

  .group-header {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-hint);
    padding: 0.75rem 0 0.35rem;
    font-family: 'DM Mono', monospace;
  }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: white;
    font-size: 13px; padding: 10px 20px;
    border-radius: var(--radius); opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    header { padding: 1.25rem 1rem 1rem; }
    .main { padding: 1rem 0.75rem 5rem; }
    .controls { padding: 0.875rem 1rem; }
    input[type=text] { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo">Nx</div>
    <div>
      <h1>Calendario Neurología HCG</h1>
      <p>Módulo Neuroinmunología · Junio 2026 · Dr. Enrique Gómez</p>
    </div>
  </div>
</header>

<div class="main">
  <div class="controls">
    <div class="controls-row">
      <span class="section-label">Buscar</span>
      <input type="text" id="search" placeholder="Nombre, fecha, tema..." oninput="render()">
      <span class="sep">·</span>
      <button class="btn-text" onclick="selAll(true)">Seleccionar visibles</button>
      <button class="btn-text" onclick="selAll(false)">Quitar selección</button>
    </div>
    <div class="controls-row">
      <span class="section-label">Residente</span>
      <div id="people-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="controls-row">
      <span class="section-label">Tipo</span>
      <div id="type-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
  </div>

  <div id="list" class="ev-list"></div>
</div>

<div class="sticky-bar">
  <div class="sticky-inner">
    <span class="count" id="count">Ningún evento seleccionado</span>
    <button class="btn-add" id="add-btn" onclick="addAll()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/>
      </svg>
      Añadir a Google Calendar
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EVENTS = [
  {id:0,date:'2026-06-01',day:'Lun 1 jun',name:'Guardia — Javier',sub:'En casa: todos. Disponibles: Amado, Omar',type:'guardia',who:['javier','amado','omar','angel','rebeca','diego','carlos h','cristi','cynthia']},

  {id:6,date:'2026-06-07',day:'Dom 7 jun',name:'Guardia — Javier',sub:'Cynthia en casa',type:'guardia',who:['javier','cynthia']},
  {id:7,date:'2026-06-08',day:'Lun 8 jun',name:'Guardia — Diego',sub:'Javier en casa. Disponibles: Amado, Omar',type:'guardia',who:['diego','javier','amado','omar']},
  {id:8,date:'2026-06-09',day:'Mar 9 jun',name:'Guardia — Ángel',sub:'Diego en casa. Disponibles: Enrique, Raúl',type:'guardia',who:['angel','diego','enrique','raul']},
  {id:9,date:'2026-06-10',day:'Mié 10 jun',name:'Guardia — Cynthia',sub:'Ángel en casa. Disponibles: Amado, Omar',type:'guardia',who:['cynthia','angel','amado','omar']},
  {id:10,date:'2026-06-11',day:'Jue 11 jun',name:'Guardia — Cristi',sub:'Cynthia en casa. Disponibles: Enrique, Raúl',type:'guardia',who:['cristi','cynthia','enrique','raul']},
  {id:11,date:'2026-06-12',day:'Vie 12 jun',name:'Guardia — Rebeca',sub:'Cristi en casa',type:'guardia',who:['rebeca','cristi']},
  {id:12,date:'2026-06-13',day:'Sáb 13 jun',name:'Guardia — Carlos H',sub:'Rebeca en casa',type:'guardia',who:['carlos h','rebeca']},
  {id:13,date:'2026-06-14',day:'Dom 14 jun',name:'Guardia — Diego',sub:'Carlos H en casa',type:'guardia',who:['diego','carlos h']},
  {id:14,date:'2026-06-01',day:'Lun 1 jun',name:'Clase: EM — Diagnósticos y subtipos',sub:'R1 Javier Plaza · sala Carlos H',type:'clase',who:['javier','carlos h']},
  {id:15,date:'2026-06-02',day:'Mar 2 jun',name:'Clase: Abordaje de Neuritis óptica',sub:'R1 Diego L · sala Cynthia',type:'clase',who:['diego','cynthia']},
  {id:16,date:'2026-06-03',day:'Mié 3 jun',name:'Entrega de guardia',sub:'Dr. Gomez',type:'clase',who:['todos']},
  {id:17,date:'2026-06-04',day:'Jue 4 jun',name:'Clase: Abordaje de Mielitis Transversa',sub:'R1 Rebeca G · sala Cristi',type:'clase',who:['rebeca','cristi']},
  {id:18,date:'2026-06-05',day:'Vie 5 jun',name:'Caso clínico: Ángel / Cynthia',sub:'Asesor: Dr. Enrique · IC Dr. Enrique',type:'caso',who:['angel','cynthia','enrique']},
  {id:19,date:'2026-06-05',day:'Vie 5 jun',name:'Consultorio 8: Cristi/Ángel · Consultorio 9: Cynthia/Becky',sub:'',type:'consultorio',who:['cristi','angel','cynthia']},
  {id:20,date:'2026-06-09',day:'Mar 9 jun',name:'Clase: EM — TME plataforma',sub:'R2 Cristina T',type:'clase',who:['cristi']},
  {id:21,date:'2026-06-10',day:'Mié 10 jun',name:'Entrega de guardia',sub:'Dr. Amavisca',type:'clase',who:['todos']},
  {id:22,date:'2026-06-11',day:'Jue 11 jun',name:'Clase: EM — TME eficacia media',sub:'R2 Carlos H',type:'clase',who:['carlos h']},
  {id:23,date:'2026-06-12',day:'Vie 12 jun',name:'Caso clínico: Rebeca / Cristi',sub:'Asesor: Dr. Raúl · IC Dr. Omar',type:'caso',who:['rebeca','cristi','raul','omar']},
  {id:24,date:'2026-06-12',day:'Vie 12 jun',name:'Consultorio 8: Carlos H/Diego · Consultorio 9: Cynthia/Javier',sub:'',type:'consultorio',who:['carlos h','diego','cynthia','javier']},
  {id:25,date:'2026-06-15',day:'Lun 15 jun',name:'Clase: EM — TME alta eficacia',sub:'R3 Cynthia C',type:'clase',who:['cynthia']},
  {id:26,date:'2026-06-16',day:'Mar 16 jun',name:'Clase: EM — Monitorización',sub:'R2 Karla V',type:'clase',who:['karla']},
  {id:27,date:'2026-06-17',day:'Mié 17 jun',name:'Entrega de guardia',sub:'Dr. José Luis',type:'clase',who:['todos']},
  {id:28,date:'2026-06-18',day:'Jue 18 jun',name:'Clase: NMOSD y MOGAD',sub:'R2 Carlos M',type:'clase',who:['carlos m']},
  {id:29,date:'2026-06-19',day:'Vie 19 jun',name:'Caso clínico: Javier / Karla',sub:'Asesor: Dr. Omar · IC Dr. Raul',type:'caso',who:['javier','karla','omar','raul']},
  {id:30,date:'2026-06-19',day:'Vie 19 jun',name:'Consultorio 8: Karla/Ángel · Consultorio 9: Cynthia/Diego',sub:'',type:'consultorio',who:['karla','angel','cynthia','diego']},
  {id:31,date:'2026-06-22',day:'Lun 22 jun',name:'Clase: Diagnóstico por imagen — enf. desmielinizantes',sub:'R3 Cynthia C',type:'clase',who:['cynthia']},
  {id:32,date:'2026-06-23',day:'Mar 23 jun',name:'Clase: ADEM',sub:'R1 Angel T · sala Karla',type:'clase',who:['angel','karla']},
  {id:33,date:'2026-06-24',day:'Mié 24 jun',name:'Entrega de guardia',sub:'Dr. Amado',type:'clase',who:['todos']},
  {id:34,date:'2026-06-25',day:'Jue 25 jun',name:'Clase: Encefalitis autoinmune',sub:'R2 Carlos M',type:'clase',who:['carlos m']},
  {id:35,date:'2026-06-26',day:'Vie 26 jun',name:'Caso clínico: Diego / Carlos H',sub:'Asesor: Dr. Amado · IC Dr. Amado',type:'caso',who:['diego','carlos h','amado']},
  {id:36,date:'2026-06-26',day:'Vie 26 jun',name:'Consultorio 8: Karla/Javier · Consultorio 9: Carlos H/Ángel',sub:'',type:'consultorio',who:['karla','javier','carlos h','angel']},
  {id:37,date:'2026-06-29',day:'Lun 29 jun',name:'Clase: Síndromes paraneoplásicos',sub:'R2 Karla V',type:'clase',who:['karla']},
  {id:38,date:'2026-06-30',day:'Mar 30 jun',name:'Clase: Manifestaciones neurol. de enf. autoinmunes',sub:'R2 Carlos H',type:'clase',who:['carlos h']},
];

const PEOPLE = ['Todos','Javier','Rebeca','Cristi','Ángel','Carlos H','Cynthia','Diego','Enrique','Raúl','Amado','Omar','Karla','Carlos M'];
const TYPE_META = {
  guardia: {lbl:'Guardia', cls:'badge-guardia', pillCls:'t-guardia'},
  clase:   {lbl:'Clase',   cls:'badge-clase',   pillCls:'t-clase'},
  caso:    {lbl:'Caso clínico', cls:'badge-caso', pillCls:'t-caso'},
  consultorio:{lbl:'Consultorio',cls:'badge-consultorio',pillCls:'t-consul'},
};

let selected = new Set();
let activePerson = 'Todos';
let activeTypes = new Set(Object.keys(TYPE_META));

function gcalUrl(ev) {
  const fmt = d => d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const s = new Date(ev.date + 'T08:00:00');
  const e = new Date(s.getTime() + 60*60000);
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent('[Neurología HCG] ' + ev.name)
    + '&dates=' + fmt(s) + '/' + fmt(e)
    + '&details=' + encodeURIComponent(ev.sub || '')
    + '&location=' + encodeURIComponent('Hospital Civil de Guadalajara Fray Antonio Alcalde');
}

function visible() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return EVENTS.filter(ev => {
    const matchPerson = activePerson === 'Todos' || ev.who.includes(activePerson.toLowerCase());
    const matchType = activeTypes.has(ev.type);
    const matchQ = !q || ev.name.toLowerCase().includes(q) || ev.sub.toLowerCase().includes(q) || ev.day.toLowerCase().includes(q);
    return matchPerson && matchType && matchQ;
  });
}

function render() {
  const evs = visible();
  const list = document.getElementById('list');
  if (!evs.length) {
    list.innerHTML = '<div class="empty">No hay eventos que coincidan con los filtros.</div>';
    updateCount();
    return;
  }
  // Group by week
  const weeks = {};
  evs.forEach(ev => {
    const d = new Date(ev.date + 'T12:00:00');
    const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().slice(0,10);
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(ev);
  });
  const weekLabels = {
    '2026-06-01':'Semana 1 — 1 al 7 de junio',
    '2026-06-08':'Semana 2 — 8 al 14 de junio',
    '2026-06-15':'Semana 3 — 15 al 21 de junio',
    '2026-06-22':'Semana 4 — 22 al 28 de junio',
    '2026-06-29':'Semana 5 — 29 al 30 de junio',
  };
  let html = '';
  Object.keys(weeks).sort().forEach(wk => {
    const lbl = weekLabels[wk] || wk;
    html += `<div class="group-header">${lbl}</div>`;
    weeks[wk].forEach(ev => {
      const chk = selected.has(ev.id);
      const m = TYPE_META[ev.type];
      html += `<div class="ev-row${chk?' checked':''}" onclick="toggle(${ev.id})">
        <input type="checkbox" ${chk?'checked':''} onclick="event.stopPropagation();toggle(${ev.id})">
        <span class="ev-date">${ev.day}</span>
        <div class="ev-body">
          <div class="ev-top">
            <span class="badge ${m.cls}">${m.lbl}</span>
            <span class="ev-name">${ev.name}</span>
          </div>
          ${ev.sub ? `<div class="ev-sub">${ev.sub}</div>` : ''}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
  updateCount();
}

function updateCount() {
  const c = selected.size;
  document.getElementById('count').textContent = c === 0 ? 'Ningún evento seleccionado' : `${c} evento${c!==1?'s':''} seleccionado${c!==1?'s':''}`;
  document.getElementById('add-btn').disabled = c === 0;
}

function toggle(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  render();
}

function selAll(val) {
  visible().forEach(ev => val ? selected.add(ev.id) : selected.delete(ev.id));
  render();
}

function setPerson(p) {
  activePerson = p;
  renderPills();
  render();
}

function toggleType(t) {
  activeTypes.has(t) ? activeTypes.delete(t) : activeTypes.add(t);
  renderPills();
  render();
}

function renderPills() {
  document.getElementById('people-pills').innerHTML = PEOPLE.map(p =>
    `<span class="pill${activePerson===p?' active':''}" onclick="setPerson('${p}')">${p}</span>`
  ).join('');
  document.getElementById('type-pills').innerHTML = Object.entries(TYPE_META).map(([k,v]) =>
    `<span class="pill ${v.pillCls}${activeTypes.has(k)?' active':''}" onclick="toggleType('${k}')">${v.lbl}</span>`
  ).join('');
}

function addAll() {
  const evs = EVENTS.filter(ev => selected.has(ev.id));
  if (!evs.length) return;
  evs.forEach((ev, i) => setTimeout(() => window.open(gcalUrl(ev), '_blank'), i * 350));
  showToast(`Abriendo ${evs.length} evento${evs.length!==1?'s':''} en Google Calendar...`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderPills();
render();
</script>
</body>
</html>
